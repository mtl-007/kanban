<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>칸반 보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>칸반 보드</h1>
    <div class="header-user" id="header-user" hidden>
      <img class="user-avatar" id="user-avatar" src="" alt="프로필" width="32" height="32">
      <span class="user-email" id="user-email"></span>
      <button class="btn-signout" id="btn-signout">로그아웃</button>
    </div>
  </header>

  <!-- 로그인 오버레이 (미인증 시 표시) -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <h1 class="login-title">칸반 보드</h1>
      <p class="login-subtitle">작업을 관리하려면 로그인하세요.</p>
      <div class="login-buttons">
        <button class="btn-oauth btn-google" id="btn-google">
          <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google로 로그인
        </button>
        <button class="btn-oauth btn-github" id="btn-github">
          <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          GitHub로 로그인
        </button>
      </div>
      <p class="login-error" id="login-error" hidden></p>
    </div>
  </div>

  <main class="kanban-board">
    <!-- TO-DO 컬럼 -->
    <section class="column" data-column="todo">
      <div class="column-header">
        <h2>TO-DO</h2>
        <span class="card-count">0</span>
      </div>
      <div class="card-list" id="todo-list">
        <div class="card" id="card-1" draggable="true">
          <button class="card-delete" aria-label="삭제">×</button>
          <p class="card-title">요구사항 분석</p>
          <p class="card-desc">프로젝트 요구사항을 문서화한다.</p>
        </div>
        <div class="card" id="card-2" draggable="true">
          <button class="card-delete" aria-label="삭제">×</button>
          <p class="card-title">디자인 시안 작성</p>
          <p class="card-desc">Figma로 UI 초안을 제작한다.</p>
        </div>
        <div class="card" id="card-3" draggable="true">
          <button class="card-delete" aria-label="삭제">×</button>
          <p class="card-title">API 명세 정의</p>
          <p class="card-desc">REST API 엔드포인트를 설계한다.</p>
        </div>
      </div>
      <div class="add-card-area">
        <form class="add-card-form" hidden>
          <input class="add-card-input" type="text" placeholder="카드 제목 입력" maxlength="50">
          <div class="add-card-actions">
            <button type="submit" class="btn-confirm">추가</button>
            <button type="button" class="btn-cancel">취소</button>
          </div>
        </form>
        <button class="btn-add-card">+ 카드 추가</button>
      </div>
    </section>

    <!-- In-Progress 컬럼 -->
    <section class="column" data-column="inprogress">
      <div class="column-header">
        <h2>In-Progress</h2>
        <span class="card-count">0</span>
      </div>
      <div class="card-list" id="inprogress-list">
        <div class="card" id="card-4" draggable="true">
          <button class="card-delete" aria-label="삭제">×</button>
          <p class="card-title">로그인 기능 개발</p>
          <p class="card-desc">JWT 기반 인증 구현 중.</p>
        </div>
        <div class="card" id="card-5" draggable="true">
          <button class="card-delete" aria-label="삭제">×</button>
          <p class="card-title">DB 스키마 설계</p>
          <p class="card-desc">사용자 테이블 및 관계 정의 중.</p>
        </div>
      </div>
      <div class="add-card-area">
        <form class="add-card-form" hidden>
          <input class="add-card-input" type="text" placeholder="카드 제목 입력" maxlength="50">
          <div class="add-card-actions">
            <button type="submit" class="btn-confirm">추가</button>
            <button type="button" class="btn-cancel">취소</button>
          </div>
        </form>
        <button class="btn-add-card">+ 카드 추가</button>
      </div>
    </section>

    <!-- Done 컬럼 -->
    <section class="column" data-column="done">
      <div class="column-header">
        <h2>Done</h2>
        <span class="card-count">0</span>
      </div>
      <div class="card-list" id="done-list">
        <div class="card" id="card-6" draggable="true">
          <button class="card-delete" aria-label="삭제">×</button>
          <p class="card-title">개발 환경 세팅</p>
          <p class="card-desc">Node.js, Git, ESLint 설정 완료.</p>
        </div>
      </div>
      <div class="add-card-area">
        <form class="add-card-form" hidden>
          <input class="add-card-input" type="text" placeholder="카드 제목 입력" maxlength="50">
          <div class="add-card-actions">
            <button type="submit" class="btn-confirm">추가</button>
            <button type="button" class="btn-cancel">취소</button>
          </div>
        </form>
        <button class="btn-add-card">+ 카드 추가</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="config.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
